name: HTML CI/CD Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ opt into Node.js 24

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24   # ✅ use latest

      - name: Install HTML validator
        run: npm install -g htmlhint

      - name: Run HTML validation
        run: htmlhint --format unix index.html

  deploy:
    needs: validate-html   # ✅ only run if validation passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:                # ✅ properly indented
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
